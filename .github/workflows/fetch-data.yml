name: Fetch Fuel Data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: # 手动触发

jobs:
  fetch:
    name: Fetch & Write to KV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @servo-map/shared build
      - name: Fetch data and write to KV
        run: npx tsx scripts/fetch-data.ts
        env:
          NSW_API_KEY: ${{ secrets.NSW_API_KEY }}
          NSW_API_AUTH: ${{ secrets.NSW_API_AUTH }}
          QLD_API_TOKEN: ${{ secrets.QLD_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_KV_NAMESPACE_ID: "7bb3949a4e20480fbde7fefeadd1fe41"
