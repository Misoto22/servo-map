name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - packages/worker/**
      - packages/shared/**
      - .github/workflows/deploy-worker.yml

jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @servo-map/shared build
      - name: Set Worker Secrets
        run: |
          echo "${{ secrets.NSW_API_KEY }}" | npx wrangler secret put NSW_API_KEY --config packages/worker/wrangler.toml
          echo "${{ secrets.NSW_API_SECRET }}" | npx wrangler secret put NSW_API_SECRET --config packages/worker/wrangler.toml
          echo "${{ secrets.NSW_API_AUTH }}" | npx wrangler secret put NSW_API_AUTH --config packages/worker/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy Worker
        run: pnpm --filter @servo-map/worker run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
